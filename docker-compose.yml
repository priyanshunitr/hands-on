services:
  postgres-1:
    image: postgres:17-alpine
    container_name: postgres-1
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"

  postgres-2:
    image: postgres:17-alpine
    container_name: postgres-2
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mydb
    ports:
      - "5434:5432"

  postgres-3:
    image: postgres:17-alpine
    container_name: postgres-3
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mydb
    ports:
      - "5435:5432"

  redis:
    image: redis:8-alpine
    container_name: redis-cache

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
